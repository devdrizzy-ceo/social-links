<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <title>Frontend Mentor | Social links profile</title>
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <link rel="stylesheet" href="./css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lexend+Deca:wght@100..900&family=Outfit:wght@100..900&family=Young+Serif&display=swap" rel="stylesheet">
  </head>
  <body>
    <main>
      <div class="jessica-image">
        <img src="./assets/images/avatar-jessica.jpeg" alt="jessica's avatar" />
      </div>
      <h1>Jessica Randall</h1>

      <span>London, United Kingdom</span>

      <p>"Front-end developer and avid reader."</p>
      <div class="socials-cards">
        <div class="cards"><p>GitHub</p></div>
        <div class="cards"><p>Frontend Mentor</p></div>
        <div class="cards"><p>LinkedIn</p></div>
        <div class="cards"><p>Twitter</p> </div>
        <div class="cards"><p>Instagram</p></div>
      </div>
    </main>
    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Your Name Here</a>.
    </footer>
  </body>
</html>
